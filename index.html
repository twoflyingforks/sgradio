<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Radio — Now Playing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 1rem 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #status {
      font-size: 0.75rem;
      color: #666;
    }
    #status.fetching { color: #888; }
    #status.ok       { color: #4ade80; }
    #status.err      { color: #f87171; }

    .section {
      padding: 0.75rem 0 0.25rem;
    }

    .section + .section {
      padding-top: 0.5rem;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      padding: 0 1rem 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      padding: 0 1rem;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      border-top: 3px solid var(--c);
      transition: transform 0.15s;
      min-height: 110px;
    }

    .card:active { transform: scale(0.97); }

    .station-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--c);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .freq {
      font-size: 0.65rem;
      color: #555;
      margin-top: -0.2rem;
    }

    .song-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.1rem;
    }

    .artwork-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
    }

    .artwork-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 5px;
      background: #252525;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .artwork {
      width: 44px;
      height: 44px;
      border-radius: 5px;
      object-fit: cover;
      display: block;
    }

    .song-text {
      flex: 1;
      min-width: 0;
    }

    .artist {
      font-size: 0.7rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Three distinct card states ── */

    /* 1. Fetching: pulsing, clearly in-progress */
    .state-fetching {
      font-size: 0.72rem;
      color: #666;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* 2. No metadata: station live but doesn't broadcast track info */
    .state-nodata {
      font-size: 0.72rem;
      color: #3a3a3a;
    }

    /* 3. Error: station unreachable */
    .state-error {
      font-size: 0.72rem;
      color: #7a3030;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .card[data-stream] { cursor: pointer; }

    .card.playing {
      background: #222;
    }

    .eq {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .card.playing .eq { display: flex; }

    .eq span {
      display: block;
      width: 3px;
      border-radius: 1px;
      background: var(--c);
      animation: eq-bounce 0.8s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1) { animation-duration: 0.6s; }
    .eq span:nth-child(2) { animation-duration: 0.9s; animation-delay: 0.15s; }
    .eq span:nth-child(3) { animation-duration: 0.7s; animation-delay: 0.05s; }

    @keyframes eq-bounce {
      from { height: 3px; }
      to   { height: 14px; }
    }

    .card.stream-error .station-name::after {
      content: " ✕";
      font-size: 0.65rem;
      color: #f87171;
    }
  </style>
</head>
<body>
  <header>
    <h1>SG Radio</h1>
    <span id="status">—</span>
  </header>

  <div class="section">
    <div class="section-label">Chinese</div>
    <div id="grid-chinese" class="grid"></div>
  </div>

  <div class="section">
    <div class="section-label">Others</div>
    <div id="grid-others" class="grid"></div>
  </div>

  <script>
    const WORKER_URL = "https://sg-radio-now-playing.sgradio.workers.dev";
    const USE_MOCK = false;

    const CHINESE_IDS = new Set(["yes933", "capital958", "hao963", "love972", "ufm100"]);

    // Scaffold used to create cards immediately on load (before first fetch).
    // Kept in sync with worker.js STATIONS order.
    const SCAFFOLD = [
      { id: "class95",     name: "Class 95",      freq: "95.0",  color: "#e63946", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CLASS95AAC.aac" },
      { id: "gold905",     name: "Gold 90.5",      freq: "90.5",  color: "#f4a261", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/GOLD905AAC.aac" },
      { id: "987fm",       name: "987FM",          freq: "98.7",  color: "#2a9d8f", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/987FMAAC.aac" },
      { id: "yes933",      name: "YES 93.3",       freq: "93.3",  color: "#e9c46a", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/YES933AAC.aac" },
      { id: "capital958",  name: "Capital 95.8",   freq: "95.8",  color: "#f7b731", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CAPITAL958FMAAC.aac" },
      { id: "hao963",      name: "Hao FM 96.3",    freq: "96.3",  color: "#26c6da", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/HAO_963AAC.aac" },
      { id: "love972",     name: "Love 97.2",      freq: "97.2",  color: "#e76f51", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOVE972FMAAC.aac" },
      { id: "symphony924", name: "Symphony 92.4",  freq: "92.4",  color: "#a8dadc", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/SYMPHONY924AAC.aac" },
      { id: "ria897",      name: "Ria 89.7",       freq: "89.7",  color: "#b388ff", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/RIA897AAC.aac" },
      { id: "warna942",    name: "Warna 94.2",     freq: "94.2",  color: "#4fc3f7", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/WARNA942AAC.aac" },
      { id: "cna938",      name: "CNA 938",        freq: "93.8",  color: "#8ac926", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CNA938AAC.aac" },
      { id: "oli968",      name: "Oli 96.8",       freq: "96.8",  color: "#ff595e", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/OLI968AAC.aac" },
      { id: "kiss92",      name: "Kiss92",         freq: "92.0",  color: "#ff006e", streamUrl: "https://live.kiss92.sg/stream" },
      { id: "onefm",       name: "One FM 91.3",    freq: "91.3",  color: "#3a86ff", streamUrl: "https://live.onefm.sg/stream" },
      { id: "ufm100",      name: "UFM 100.3",      freq: "100.3", color: "#8338ec", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/UFM_1003AAC.aac" },
      { id: "moneyfm",     name: "Money FM 89.3",  freq: "89.3",  color: "#06d6a0", streamUrl: "https://live.moneyfm893.sg/stream" },
    ];

    const MOCK_STATIONS = [
      { id: "class95",     artist: "Taylor Swift",   title: "Anti-Hero" },
      { id: "gold905",     artist: "Cyndi Lauper",   title: "Girls Just Want to Have Fun" },
      { id: "987fm",       artist: "Olivia Rodrigo", title: "vampire" },
      { id: "yes933",      artist: "Jay Chou",       title: "七里香" },
      { id: "capital958",  artist: "周杰伦",           title: "稻香" },
      { id: "hao963",      artist: "邓紫棋",           title: "泡沫" },
      { id: "love972",     artist: "Bruno Mars",     title: "Just the Way You Are" },
      { id: "symphony924", artist: null,             title: "Beethoven — Symphony No. 9" },
      { id: "ria897",      artist: "Siti Nurhaliza", title: "Cindai" },
      { id: "warna942",    artist: "Sheila Majid",   title: "Sinaran" },
      { id: "cna938",      artist: null,             title: null },
      { id: "oli968",      artist: "A.R. Rahman",    title: "Jai Ho" },
      { id: "kiss92",      artist: "Dua Lipa",       title: "Levitating" },
      { id: "onefm",       artist: null,             title: null,  error: "timeout" },
      { id: "ufm100",      artist: "邓紫棋",          title: "光年之外" },
      { id: "moneyfm",     artist: null,             title: "Morning Market Watch" },
    ];

    const statusEl = document.getElementById("status");
    const cards = {};

    // Build all cards immediately with fetching state — no blank flash on load.
    SCAFFOLD.forEach(s => {
      const el = document.createElement("div");
      el.className = "card";
      el.style.setProperty("--c", s.color);
      if (s.streamUrl) el.dataset.stream = s.streamUrl;
      el.innerHTML = `
        <div style="display:flex;align-items:center;overflow:hidden">
          <div class="station-name">${s.name}</div>
          <div class="eq"><span></span><span></span><span></span></div>
        </div>
        <div class="freq">${s.freq} FM</div>
        <div class="song-info"><div class="state-fetching">Getting info…</div></div>
      `;
      const grid = document.getElementById(CHINESE_IDS.has(s.id) ? "grid-chinese" : "grid-others");
      grid.appendChild(el);
      cards[s.id] = el;
    });

    // iTunes Search API for album artwork — cached by "artist|title"
    const artworkCache = {};
    async function fetchArtwork(artist, title) {
      const key = `${artist}|${title}`;
      if (key in artworkCache) return artworkCache[key];
      artworkCache[key] = null; // prevent duplicate requests
      try {
        const q = encodeURIComponent(`${artist} ${title}`);
        const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&limit=1&entity=song`);
        const data = await res.json();
        const item = data.results?.[0];
        const url = item?.artworkUrl100?.replace("100x100bb", "200x200bb") || null;
        artworkCache[key] = url;
        return url;
      } catch {
        return null;
      }
    }

    function setCardSong(el, s) {
      const info = el.querySelector(".song-info");
      if (s.error) {
        info.innerHTML = `<div class="state-error">Station unreachable</div>`;
        return;
      }
      if (!s.title) {
        info.innerHTML = `<div class="state-nodata">No track info</div>`;
        return;
      }
      const artistHtml = s.artist ? `<div class="artist">${esc(s.artist)}</div>` : "";
      info.innerHTML = `
        <div class="song-row">
          <div class="artwork-wrap"><div class="artwork-placeholder"></div></div>
          <div class="song-text">${artistHtml}<div class="title">${esc(s.title)}</div></div>
        </div>`;

      const wrap = info.querySelector(".artwork-wrap");
      const artworkUrl = s.artwork || null;
      if (artworkUrl) {
        // Worker already supplied artwork (e.g. Firebase stations)
        wrap.innerHTML = `<img class="artwork" src="${artworkUrl}" alt="" loading="lazy">`;
      } else if (s.artist) {
        // Look up via iTunes
        fetchArtwork(s.artist, s.title).then(url => {
          if (!info.isConnected) return;
          if (url) wrap.innerHTML = `<img class="artwork" src="${url}" alt="" loading="lazy">`;
          else wrap.style.display = "none";
        });
      } else {
        wrap.style.display = "none";
      }
    }

    function esc(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("en-SG", {
        hour: "2-digit", minute: "2-digit", second: "2-digit",
      });
    }

    async function refresh() {
      statusEl.textContent = "Updating…";
      statusEl.className = "fetching";
      try {
        let stations;
        if (USE_MOCK) {
          stations = SCAFFOLD.map(s => ({
            ...s,
            ...(MOCK_STATIONS.find(m => m.id === s.id) || {}),
          }));
        } else {
          const res = await fetch(WORKER_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          ({ stations } = await res.json());
        }
        stations.forEach(s => {
          const el = cards[s.id];
          if (el) setCardSong(el, s);
        });
        statusEl.textContent = `Updated ${fmtTime(Date.now())}`;
        statusEl.className = "ok";
      } catch (e) {
        statusEl.textContent = "Error — retrying…";
        statusEl.className = "err";
        console.error(e);
      }
    }

    // Tap-to-play
    const audio = new Audio();
    let playingId = null;

    function stopStation() {
      if (!playingId) return;
      const prev = cards[playingId];
      if (prev) { prev.classList.remove("playing", "stream-error"); }
      audio.pause();
      audio.src = "";
      audio.load();
      playingId = null;
    }

    audio.onerror = () => {
      if (!playingId) return;
      const el = cards[playingId];
      stopStation();
      if (el) el.classList.add("stream-error");
    };

    document.querySelectorAll(".card[data-stream]").forEach(el => {
      el.addEventListener("click", () => {
        const stationId = Object.keys(cards).find(id => cards[id] === el);
        if (!stationId) return;
        if (playingId === stationId) {
          stopStation();
          return;
        }
        stopStation();
        audio.src = el.dataset.stream;
        audio.play().catch(() => {
          if (playingId === stationId) {
            stopStation();
            el.classList.add("stream-error");
          }
        });
        el.classList.add("playing");
        el.classList.remove("stream-error");
        playingId = stationId;
      });
    });

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
