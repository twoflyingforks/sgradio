<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Radio — Now Playing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 1rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #status {
      font-size: 0.75rem;
      color: #888;
    }

    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      padding: 0.75rem 1rem 2rem;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      border-top: 3px solid var(--c);
      transition: transform 0.15s;
      min-height: 110px;
    }

    .card:active { transform: scale(0.97); }

    .station-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--c);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .freq {
      font-size: 0.65rem;
      color: #666;
      margin-top: -0.2rem;
    }

    .artist {
      font-size: 0.7rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .no-data {
      font-size: 0.72rem;
      color: #555;
      font-style: italic;
    }

    .loading { animation: pulse 1.4s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <header>
    <h1>SG Radio</h1>
    <span id="status">Loading…</span>
  </header>
  <div id="grid"></div>

  <script>
    const WORKER_URL = "https://sg-radio-now-playing.YOUR_SUBDOMAIN.workers.dev";
    const USE_MOCK = true;

    const MOCK = {
      stations: [
        { id: "class95",     name: "Class 95",      freq: "95.0",  color: "#e63946", artist: "Taylor Swift",  title: "Anti-Hero" },
        { id: "gold905",     name: "Gold 90.5",      freq: "90.5",  color: "#f4a261", artist: "Cyndi Lauper",  title: "Girls Just Want to Have Fun" },
        { id: "987fm",       name: "987FM",          freq: "98.7",  color: "#2a9d8f", artist: "Olivia Rodrigo", title: "vampire" },
        { id: "yes933",      name: "YES 93.3",       freq: "93.3",  color: "#e9c46a", artist: "Jay Chou",      title: "七里香" },
        { id: "love972",     name: "Love 97.2",      freq: "97.2",  color: "#e76f51", artist: "Bruno Mars",    title: "Just the Way You Are" },
        { id: "symphony924", name: "Symphony 92.4",  freq: "92.4",  color: "#a8dadc", artist: null,            title: "Beethoven — Symphony No. 9" },
        { id: "ria897",      name: "Ria 89.7",       freq: "89.7",  color: "#b388ff", artist: "Siti Nurhaliza", title: "Cindai" },
        { id: "warna942",    name: "Warna 94.2",     freq: "94.2",  color: "#4fc3f7", artist: "Sheila Majid",  title: "Sinaran" },
        { id: "cna938",      name: "CNA 938",        freq: "93.8",  color: "#8ac926", artist: null,            title: null },
        { id: "oli968",      name: "Oli 96.8",       freq: "96.8",  color: "#ff595e", artist: "A.R. Rahman",   title: "Jai Ho" },
        { id: "kiss92",      name: "Kiss92",         freq: "92.0",  color: "#ff006e", artist: "Dua Lipa",      title: "Levitating" },
        { id: "onefm",       name: "One FM 91.3",    freq: "91.3",  color: "#3a86ff", artist: null,            title: null },
        { id: "ufm100",      name: "UFM 100.3",      freq: "100.3", color: "#8338ec", artist: "邓紫棋",         title: "光年之外" },
        { id: "moneyfm",     name: "Money FM 89.3",  freq: "89.3",  color: "#06d6a0", artist: null,            title: "Morning Market Watch" },
      ],
      ts: Date.now(),
    };

    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    let cards = {};

    function renderCards(stations) {
      if (Object.keys(cards).length === 0) {
        stations.forEach(s => {
          const el = document.createElement("div");
          el.className = "card";
          el.style.setProperty("--c", s.color);
          el.innerHTML = `
            <div class="station-name">${s.name}</div>
            <div class="freq">${s.freq} FM</div>
            <div class="song-info"></div>
          `;
          grid.appendChild(el);
          cards[s.id] = el;
        });
      }
      stations.forEach(s => {
        const el = cards[s.id];
        if (!el) return;
        const info = el.querySelector(".song-info");
        if (s.title) {
          info.innerHTML = `
            ${s.artist ? `<div class="artist">${esc(s.artist)}</div>` : ""}
            <div class="title">${esc(s.title)}</div>
          `;
        } else {
          info.innerHTML = `<div class="no-data">No track info</div>`;
        }
      });
    }

    function esc(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    async function refresh() {
      try {
        let data;
        if (USE_MOCK) {
          data = { ...MOCK, ts: Date.now() };
        } else {
          const res = await fetch(WORKER_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          data = await res.json();
        }
        renderCards(data.stations);
        statusEl.textContent = `Updated ${fmtTime(data.ts)}`;
        statusEl.className = "ok";
      } catch (e) {
        statusEl.textContent = "Error — retrying…";
        statusEl.className = "err";
        console.error(e);
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
