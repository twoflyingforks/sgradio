<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Radio — Now Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-tertiary: #555;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 32px 40px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-left: auto;
    }

    .refresh-indicator svg {
      transform: rotate(-90deg);
      flex-shrink: 0;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.07);
      stroke-width: 2;
    }

    .ring-progress {
      fill: none;
      stroke: var(--text-tertiary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 69.115;
      stroke-dashoffset: 0;
      transition: stroke 0.4s;
    }

    .ring-progress.fetching {
      stroke: var(--text-secondary);
    }

    #updated-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: stretch;
      height: 108px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s;
    }

    .card[data-stream]:hover {
      border-color: var(--border-hover);
    }

    .card-content {
      flex: 1;
      padding: 14px 12px 14px 14px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      z-index: 1;
    }

    .freq {
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .station-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-info {
      margin-top: auto;
    }

    .artist {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Album art panel */
    .card-art {
      width: 90px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      z-index: 1;
    }

    .card-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Playing state */
    .card.playing {
      border-top: 2px solid var(--c);
      border-left-color: var(--border);
      border-right-color: var(--border);
      border-bottom-color: var(--border);
    }

    .card.playing::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--c);
      opacity: 0.10;
      pointer-events: none;
      z-index: 0;
    }

    .card.playing .freq {
      color: var(--c);
    }

    /* Equalizer */
    .eq {
      display: none;
      position: absolute;
      top: 10px;
      right: 98px;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      z-index: 2;
    }

    .card.playing .eq { display: flex; }

    .eq span {
      display: block;
      width: 3px;
      border-radius: 1px;
      background: var(--c);
      animation: eq-bounce 0.8s ease-in-out infinite alternate;
    }

    .eq span:nth-child(1) { height: 8px;  animation-duration: 0.5s; }
    .eq span:nth-child(2) { height: 12px; animation-duration: 0.7s; animation-delay: 0.10s; }
    .eq span:nth-child(3) { height: 6px;  animation-duration: 0.4s; animation-delay: 0.05s; }
    .eq span:nth-child(4) { height: 10px; animation-duration: 0.8s; animation-delay: 0.15s; }

    @keyframes eq-bounce {
      from { height: 30%; }
      to   { height: 100%; }
    }

    .card.stream-error {
      border-color: rgba(248,113,113,0.25);
    }

    footer {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 600px) {
      body { padding: 16px 16px 32px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .freq { font-size: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">SG Radio</span>
    <span class="logo-sub">FM 88—108</span>
    <div class="refresh-indicator">
      <svg width="22" height="22" viewBox="0 0 22 22">
        <circle class="ring-track" cx="11" cy="11" r="9"/>
        <circle class="ring-progress" id="countdown-ring" cx="11" cy="11" r="9"/>
      </svg>
      <span id="updated-time">—</span>
    </div>
  </header>

  <div class="section">
    <div class="section-label">Chinese</div>
    <div id="grid-chinese" class="grid"></div>
  </div>

  <div class="section">
    <div class="section-label">English</div>
    <div id="grid-english" class="grid"></div>
  </div>

  <div class="section">
    <div class="section-label">Malay &amp; Tamil</div>
    <div id="grid-malay" class="grid"></div>
  </div>


  <script>
    const WORKER_URL = "https://sg-radio-now-playing.sgradio.workers.dev";
    const USE_MOCK = false;

    const CHINESE_IDS = new Set(["yes933", "capital958", "hao963", "love972", "ufm100"]);
    const MALAY_IDS   = new Set(["ria897", "warna942", "oli968"]);

    const SCAFFOLD = [
      { id: "class95",     name: "Class 95",      freq: "95.0",  color: "#e63946", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CLASS95AAC.aac" },
      { id: "gold905",     name: "Gold 90.5",      freq: "90.5",  color: "#f4a261", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/GOLD905AAC.aac" },
      { id: "987fm",       name: "987FM",          freq: "98.7",  color: "#2a9d8f", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/987FMAAC.aac" },
      { id: "yes933",      name: "YES 93.3",       freq: "93.3",  color: "#e9c46a", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/YES933AAC.aac" },
      { id: "capital958",  name: "Capital 95.8",   freq: "95.8",  color: "#f7b731", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CAPITAL958FMAAC.aac" },
      { id: "hao963",      name: "Hao FM 96.3",    freq: "96.3",  color: "#26c6da", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/HAO_963AAC.aac" },
      { id: "love972",     name: "Love 97.2",      freq: "97.2",  color: "#e76f51", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOVE972FMAAC.aac" },
      { id: "symphony924", name: "Symphony 92.4",  freq: "92.4",  color: "#a8dadc", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/SYMPHONY924AAC.aac" },
      { id: "ria897",      name: "Ria 89.7",       freq: "89.7",  color: "#b388ff", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/RIA897FM.aac" },
      { id: "warna942",    name: "Warna 94.2",     freq: "94.2",  color: "#4fc3f7", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/WARNA942FM.aac" },
      { id: "cna938",      name: "CNA 938",        freq: "93.8",  color: "#8ac926", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/CNA938AAC.aac" },
      { id: "oli968",      name: "Oli 96.8",       freq: "96.8",  color: "#ff595e", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/OLI968FM.aac" },
      { id: "kiss92",      name: "Kiss92",         freq: "92.0",  color: "#ff006e", streamUrl: "https://live.kiss92.sg/stream" },
      { id: "onefm",       name: "One FM 91.3",    freq: "91.3",  color: "#3a86ff", streamUrl: "https://live.onefm.sg/stream" },
      { id: "ufm100",      name: "UFM 100.3",      freq: "100.3", color: "#8338ec", streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/UFM_1003AAC.aac" },
      { id: "moneyfm",     name: "Money FM 89.3",  freq: "89.3",  color: "#06d6a0", streamUrl: "https://live.moneyfm893.sg/stream" },
    ];

    const MOCK_STATIONS = [
      { id: "class95",     artist: "Taylor Swift",   title: "Anti-Hero" },
      { id: "gold905",     artist: "Cyndi Lauper",   title: "Girls Just Want to Have Fun" },
      { id: "987fm",       artist: "Olivia Rodrigo", title: "vampire" },
      { id: "yes933",      artist: "Jay Chou",       title: "七里香" },
      { id: "capital958",  artist: "周杰伦",           title: "稻香" },
      { id: "hao963",      artist: "邓紫棋",           title: "泡沫" },
      { id: "love972",     artist: "Bruno Mars",     title: "Just the Way You Are" },
      { id: "symphony924", artist: null,             title: "Beethoven — Symphony No. 9" },
      { id: "ria897",      artist: "Siti Nurhaliza", title: "Cindai" },
      { id: "warna942",    artist: "Sheila Majid",   title: "Sinaran" },
      { id: "cna938",      artist: null,             title: null },
      { id: "oli968",      artist: "A.R. Rahman",    title: "Jai Ho" },
      { id: "kiss92",      artist: "Dua Lipa",       title: "Levitating" },
      { id: "onefm",       artist: null,             title: null, error: "timeout" },
      { id: "ufm100",      artist: "邓紫棋",          title: "光年之外" },
      { id: "moneyfm",     artist: null,             title: "Morning Market Watch" },
    ];

    const ring = document.getElementById("countdown-ring");
    const updatedTime = document.getElementById("updated-time");
    const CIRCUMFERENCE = 2 * Math.PI * 9; // r=9 → ≈56.55
    const REFRESH_INTERVAL = 30000;
    let lastRefreshTime = Date.now();

    ring.style.strokeDasharray = CIRCUMFERENCE;

    setInterval(() => {
      const elapsed = Date.now() - lastRefreshTime;
      const fraction = Math.min(elapsed / REFRESH_INTERVAL, 1);
      ring.style.strokeDashoffset = fraction * CIRCUMFERENCE;
    }, 100);

    const cards = {};

    SCAFFOLD.forEach(s => {
      const el = document.createElement("div");
      el.className = "card";
      el.style.setProperty("--c", s.color);
      if (s.streamUrl) el.dataset.stream = s.streamUrl;
      el.innerHTML = `
        <div class="card-content">
          <div class="freq">${s.freq}</div>
          <div class="station-name">${s.name}</div>
          <div class="track-info"></div>
        </div>
        <div class="eq"><span></span><span></span><span></span><span></span></div>
        <div class="card-art"></div>
      `;

      let gridId;
      if (CHINESE_IDS.has(s.id))     gridId = "grid-chinese";
      else if (MALAY_IDS.has(s.id))  gridId = "grid-malay";
      else                            gridId = "grid-english";

      document.getElementById(gridId).appendChild(el);
      cards[s.id] = el;
    });

    const artworkCache = {};
    async function fetchArtwork(artist, title) {
      const key = `${artist}|${title}`;
      if (key in artworkCache) return artworkCache[key];
      artworkCache[key] = null;
      try {
        const q = encodeURIComponent(`${artist} ${title}`);
        const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&limit=1&entity=song`);
        const data = await res.json();
        const item = data.results?.[0];
        const url = item?.artworkUrl100?.replace("100x100bb", "200x200bb") || null;
        artworkCache[key] = url;
        return url;
      } catch {
        return null;
      }
    }

    function setCardSong(el, s) {
      const info = el.querySelector(".track-info");
      const artPanel = el.querySelector(".card-art");

      if (!s.title) {
        info.innerHTML = "";
        artPanel.innerHTML = "";
        return;
      }

      const artistHtml = s.artist ? `<div class="artist">${esc(s.artist)}</div>` : "";
      info.innerHTML = `${artistHtml}<div class="title">${esc(s.title)}</div>`;

      if (s.artwork) {
        artPanel.innerHTML = `<img src="${s.artwork}" alt="" loading="lazy">`;
      } else if (s.artist) {
        fetchArtwork(s.artist, s.title).then(url => {
          if (!artPanel.isConnected) return;
          if (url) artPanel.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
        });
      }
    }

    function esc(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" });
    }

    async function refresh() {
      ring.classList.add("fetching");
      try {
        let stations;
        if (USE_MOCK) {
          stations = SCAFFOLD.map(s => ({
            ...s,
            ...(MOCK_STATIONS.find(m => m.id === s.id) || {}),
          }));
        } else {
          const res = await fetch(WORKER_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          ({ stations } = await res.json());
        }
        stations.forEach(s => {
          const el = cards[s.id];
          if (el) setCardSong(el, s);
        });
        lastRefreshTime = Date.now();
        ring.style.strokeDashoffset = 0;
        updatedTime.textContent = fmtTime(lastRefreshTime);
      } catch (e) {
        console.error(e);
      } finally {
        ring.classList.remove("fetching");
      }
    }

    // Tap-to-play
    const audio = new Audio();
    let playingId = null;

    function stopStation() {
      if (!playingId) return;
      const prev = cards[playingId];
      if (prev) prev.classList.remove("playing", "stream-error");
      audio.pause();
      audio.src = "";
      audio.load();
      playingId = null;
    }

    audio.onerror = () => {
      if (!playingId) return;
      const el = cards[playingId];
      stopStation();
      if (el) el.classList.add("stream-error");
    };

    document.querySelectorAll(".card[data-stream]").forEach(el => {
      el.addEventListener("click", () => {
        const stationId = Object.keys(cards).find(id => cards[id] === el);
        if (!stationId) return;
        if (playingId === stationId) { stopStation(); return; }
        stopStation();
        audio.src = el.dataset.stream;
        audio.play().catch(() => {
          if (playingId === stationId) { stopStation(); el.classList.add("stream-error"); }
        });
        el.classList.add("playing");
        el.classList.remove("stream-error");
        playingId = stationId;
      });
    });

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
